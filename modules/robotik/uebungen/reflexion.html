<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forscher-Reflexion</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body { font-family: 'Outfit', sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen py-6 px-4 md:px-8">
<div class="max-w-4xl mx-auto">

<header class="bg-gradient-to-r from-violet-600 to-purple-700 rounded-3xl p-6 md:p-8 text-white shadow-xl shadow-violet-100 mb-8 text-center relative overflow-hidden">
<div class="absolute -top-10 -left-10 w-32 h-32 bg-white opacity-10 rounded-full"></div>
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
<span class="bg-violet-500/30 text-violet-100 text-xs md:text-sm font-semibold uppercase tracking-wider px-3 py-1 rounded-full border border-violet-400/30">💡 Leitfrage</span>
<h1 class="text-3xl md:text-4xl font-extrabold mt-3 tracking-tight">Forscher-Reflexion</h1>
<p class="text-violet-100 mt-2 text-sm md:text-base max-w-xl mx-auto">Du hast viele Programme geplant und getestet. Zeit für die große Frage.</p>
</header>

<section class="bg-white border border-violet-100 rounded-3xl p-6 md:p-8 shadow-sm">
<p class="text-sm text-slate-600 mb-4 leading-relaxed">Nachdem du Programme für den Roboter und die Schnecke gebaut hast: Was denkst du jetzt?</p>
<div class="bg-violet-50/50 rounded-2xl p-5 border border-violet-100">
<h4 class="font-bold text-violet-900 text-base mb-3">Können Roboter wirklich alleine denken?</h4>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
<button onclick="selectReflection('yes')" class="text-left text-sm p-4 bg-white hover:bg-rose-50 hover:border-rose-300 border border-slate-200 rounded-2xl transition-all flex items-start gap-3">
<span class="text-lg text-rose-500 flex-none">🔴</span>
<div>
<strong class="block text-slate-800">Ja, natürlich</strong>
<span class="text-xs text-slate-500">Sie bewegen sich von allein auf der Karte und weichen Hindernissen aus.</span>
</div>
</button>
<button onclick="selectReflection('no')" class="text-left text-sm p-4 bg-white hover:bg-emerald-50 hover:border-emerald-300 border border-slate-200 rounded-2xl transition-all flex items-start gap-3">
<span class="text-lg text-emerald-500 flex-none">🟢</span>
<div>
<strong class="block text-slate-800">Nein, niemals</strong>
<span class="text-xs text-slate-500">Sie führen nur stur die Liste (Algorithmus) aus, die wir Programmierer ihnen geben.</span>
</div>
</button>
</div>
<div id="reflection-feedback" class="mt-4 p-4 rounded-xl text-sm font-medium bg-slate-100 border border-slate-200 hidden"></div>
</div>
</section>

<script>
function triggerConfetti() {
  if (typeof confetti === 'function') confetti({particleCount: 100, spread: 70, origin: {y: 0.6}});
}

function selectReflection(val) {
  const fb = document.getElementById('reflection-feedback');
  fb.classList.remove('hidden');
  if (val === 'yes') {
    fb.className = "mt-4 p-4 rounded-xl text-sm font-medium bg-rose-50 border border-rose-200 text-rose-900";
    fb.innerHTML = "<strong>Noch nicht ganz. 🔴</strong><br>Es sieht zwar so aus, weil der Roboter sich bewegt. Aber er tut nur genau das, was wir vorher in seinen Speicher geladen haben. Ohne unsere Befehle würde er für immer stehen bleiben. Er denkt nicht selbst.";
  } else {
    fb.className = "mt-4 p-4 rounded-xl text-sm font-medium bg-emerald-50 border border-emerald-200 text-emerald-900";
    fb.innerHTML = "<strong>Großartig erkannt! 🟢</strong><br>Genau! Ein Roboter ist eine Maschine. Er folgt blind den Befehlen, die wir Programmierer ihm aufgeschrieben haben. Deshalb müssen wir präzise und vorausschauend planen. Du hast verstanden, worum es in der Informatik geht.";
    triggerConfetti();
  }
}
</script>

</div>
</body>
</html>
