<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotik in der Grundschule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #fffaeb;
            min-height: 100vh;
            font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
        }
        .stage {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }
        .hero {
            position: relative;
            width: 100%;
            line-height: 0;
        }
        .hero img {
            display: block;
            width: 100%;
            height: auto;
        }
        /* Klickbare Bereiche über den Karten, unsichtbar */
        .hotspot {
            position: absolute;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
        .hotspot:focus-visible {
            outline: 3px solid #f59e0b;
            outline-offset: -3px;
            border-radius: 16px;
        }
        /* Koordinaten in % bezogen auf das Canva-PNG (2049 x 1215) */
        .hotspot-schueler {
            left: 42.2%;
            top: 16.8%;
            width: 22.7%;
            height: 67%;
        }
        .hotspot-eltern {
            left: 68.1%;
            top: 16.8%;
            width: 22.7%;
            height: 67%;
        }

        /* Sichtbare Text-Links unter dem Bild */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 24px;
            padding: 0 4%;
        }
        .action {
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 500;
            color: #2d2d2d;
        }
        .action a {
            color: #b45309;
            font-weight: 600;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
            transition: color .15s ease;
        }
        .action a:hover,
        .action a:focus-visible {
            color: #1a1a1a;
            text-decoration-color: #fcd34d;
        }
        .action .label {
            display: block;
            font-weight: 700;
            font-size: 1.05rem;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .footer {
            text-align: center;
            margin-top: 56px;
            color: #92651a;
            font-size: 0.9rem;
        }
        .footer a {
            color: #92651a;
            font-weight: 500;
        }

        @media (max-width: 720px) {
            .actions {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .action { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="stage">

    <div class="hero">
        <img src="assets/canva-landing.png" alt="Robotik in der Grundschule. Zwei Bereiche: Für Schüler und Für Eltern und Lehrkräfte.">

        <a class="hotspot hotspot-schueler"
           href="https://lernplattform.bycs.de/course/view.php?id=2509300"
           target="_blank" rel="noopener"
           aria-label="Für Schüler: zum ByCS-Begleitkurs"></a>

        <a class="hotspot hotspot-eltern"
           href="https://testtesttest3343e.my.canva.site/robotik-in-der-grundschule"
           target="_blank" rel="noopener"
           aria-label="Für Eltern und Lehrkräfte: Begleitwebseite mit didaktischen Hinweisen"></a>
    </div>

    <div class="actions">
        <p class="action">
            <span class="label">Für Schüler</span>
            Du machst bei der Robotik-AG mit?
            <a href="https://lernplattform.bycs.de/course/view.php?id=2509300" target="_blank" rel="noopener">Klicke hier</a>
            für deine Aufgaben und Tipps.
        </p>
        <p class="action">
            <span class="label">Für Eltern und Lehrkräfte</span>
            Aufgaben und Material mit ergänzenden
            <a href="https://testtesttest3343e.my.canva.site/robotik-in-der-grundschule" target="_blank" rel="noopener">Hinweisen</a>.
        </p>
    </div>

    <div class="footer">
        Begleitseite zur Robotik-AG der GS Kissing. <a href="robotik-reise.html">Direkt zu den Mini-Missionen →</a>
    </div>

</div>
</body>
</html>
