<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotik in der Grundschule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #fffaeb;
            min-height: 100vh;
            font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
        }
        .stage {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }
        .hero {
            position: relative;
            width: 100%;
            line-height: 0;
        }
        .hero img {
            display: block;
            width: 100%;
            height: auto;
        }
        /* Klickbare Bereiche über den Karten, unsichtbar */
        .hotspot {
            position: absolute;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
        .hotspot:focus-visible {
            outline: 3px solid #f59e0b;
            outline-offset: -3px;
            border-radius: 16px;
        }
        /* Koordinaten in % bezogen auf das Canva-PNG (2049 x 1215) */
        .hotspot-schueler {
            left: 42.2%;
            top: 16.8%;
            width: 22.7%;
            height: 67%;
        }
        .hotspot-eltern {
            left: 68.1%;
            top: 16.8%;
            width: 22.7%;
            height: 67%;
        }
    </style>
</head>
<body>
<div class="stage">

    <div class="hero">
        <img src="assets/canva-landing.png" alt="Robotik in der Grundschule. Zwei Bereiche: Für Schüler und Für Eltern und Lehrkräfte.">

        <a class="hotspot hotspot-schueler"
           href="https://lernplattform.bycs.de/course/view.php?id=2509300"
           target="_blank" rel="noopener"
           aria-label="Für Schüler: zum ByCS-Begleitkurs"></a>

        <a class="hotspot hotspot-eltern"
           href="https://testtesttest3343e.my.canva.site/robotik-in-der-grundschule"
           target="_blank" rel="noopener"
           aria-label="Für Eltern und Lehrkräfte: Begleitwebseite mit didaktischen Hinweisen"></a>
    </div>

</div>
</body>
</html>
