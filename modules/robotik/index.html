<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotik & Programmierung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .rounded-canva {
            border-radius: 2rem;
        }

        .shadow-canva {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* Neue Violett-Akkorde für Robotik */
        .btn-violet {
            background-color: #7c3aed;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-violet:hover {
            background-color: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .emoji-bounce:hover {
            animation: pulse 0.6s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-slate-900">

    <div id="app"></div>

    <script>
        // --- 1. Sound System ---
        const sounds = {
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'),
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3')
        };
        sounds.success.volume = 0.3;
        sounds.click.volume = 0.2;

        function playSound(type) {
            if (sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].play().catch(() => { });
            }
        }

        // --- 2. Missionen ---
        const MISSIONS = [
            {
                title: "Start bei grüner Flagge",
                task: "Lasse deine Figur nach rechts laufen, sobald die grüne Flagge angetippt wird.",
                tip: "Der gelbe Start-Block 'Start bei grüner Flagge' beginnt deine Befehlskette.",
                badge: "🏁",
                badgeTitle: "Starter",
                blocks: ["onflag", "right"]
            },
            {
                title: "Ein lustiger Hüpfer",
                task: "Lerne den Hüpfen-Block kennen. Er lässt deine Figur hochspringen und wieder landen.",
                tip: "Blaue Bewegungsblöcke wie 'Hüpfen' verändern die Position deiner Figur.",
                badge: "🦘",
                badgeTitle: "Hüpfer",
                blocks: ["onflag", "hop"]
            },
            {
                title: "Alles auf Wiederholung",
                task: "Nutze den Wiederholen-Block, um eine Bewegung mehrmals auszuführen.",
                tip: "Der orangefarbene Kontroll-Block spart dir Zeit.",
                badge: "🔁",
                badgeTitle: "Loop-Meister",
                blocks: ["onflag", "repeat", "up"]
            },
            {
                title: "Verstecken spielen",
                task: "Mache deine Figur unsichtbar, indem du den pinken Verbergen-Block benutzt.",
                tip: "Pinke Aussehen-Blöcke lassen deine Figur langsam verblassen.",
                badge: "👻",
                badgeTitle: "Versteck-Profi",
                blocks: ["onflag", "hide"]
            }
        ];

        // --- 3. State ---
        let state = {
            view: 'landing', // 'landing', 'missions', 'finished', 'certificate'
            currentIndex: 0,
            userName: ""
        };

        // --- 4. Logic ---
        function render() {
            const app = document.getElementById('app');
            let html = '';

            // Header (Passend zur Landing Page)
            const header = `
                <header class="bg-white border-b border-slate-200">
                    <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='../../index.html'">
                            <img src="../../assets/Logo thomas.png" alt="Logo" class="w-10 h-10 rounded-full border border-slate-200 object-cover">
                            <span class="text-xl font-bold text-slate-900"><span class="text-blue-600">Das</span> Klassenzimmer</span>
                        </div>
                        <button onclick="window.location.href='../../index.html'" class="text-slate-600 hover:text-violet-600 font-medium flex items-center gap-2">
                            🏠 Zurück zum Dashboard
                        </button>
                    </nav>
                </header>
            `;

            if (state.view === 'landing') {
                html = header + `
                <main class="max-w-5xl mx-auto px-6 py-16 animate-fadeIn text-center">
                    <div class="inline-block p-6 bg-violet-100 rounded-3xl mb-8 emoji-bounce shadow-sm">
                        <span class="text-7xl">🤖</span>
                    </div>
                    <h1 class="text-5xl md:text-6xl font-bold text-slate-900 mb-6">
                        Deine <span class="text-violet-600">Robotik</span> Reise
                    </h1>
                    <p class="text-xl text-slate-600 max-w-2xl mx-auto mb-12 leading-relaxed">
                        Lerne heute, wie man Befehle gibt. Programmiere deine eigenen Abenteuer mit bunter Block-Logik!
                    </p>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                        <!-- Card 1: Aufgaben -->
                        <div onclick="state.view='missions'; render(); playSound('click');" class="bg-white p-8 rounded-canva border border-slate-200 shadow-sm hover:shadow-xl hover:border-violet-300 transition-all cursor-pointer text-left flex flex-col group">
                            <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">🚀</div>
                            <h3 class="text-2xl font-bold text-slate-900 mb-2">Kleine Aufgaben</h3>
                            <p class="text-slate-600 mb-6">Löse 4 spannende Missionen und werde zum Programmier-Profi.</p>
                            <button class="w-full btn-violet py-3 rounded-xl font-bold mt-auto">Starten</button>
                        </div>

                        <!-- Card 2: Anleitung -->
                        <a href="anleitung.html" class="bg-white p-8 rounded-canva border border-slate-200 shadow-sm hover:shadow-xl hover:border-blue-300 transition-all cursor-pointer text-left flex flex-col group block">
                            <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📖</div>
                            <h3 class="text-2xl font-bold text-slate-900 mb-2 text-black">Anleitung</h3>
                            <p class="text-slate-600 mb-6">Schritt-für-Schritt Anleitung zu deinem ersten Programm.</p>
                            <button class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold mt-auto hover:bg-slate-800 transition-colors">Öffnen</button>
                        </a>

                        <!-- Card 3: Lexikon -->
                        <a href="library.html" class="bg-white p-8 rounded-canva border border-slate-200 shadow-sm hover:shadow-xl hover:border-blue-300 transition-all cursor-pointer text-left flex flex-col group">
                            <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📚</div>
                            <h3 class="text-2xl font-bold text-slate-900 mb-2">Block-Lexikon</h3>
                            <p class="text-slate-600 mb-6">Alle wichtigen Blöcke schnell nachschlagen und verstehen.</p>
                            <button class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold mt-auto hover:bg-slate-800 transition-colors">Öffnen</button>
                        </a>
                    </div>

                    <div class="mt-16 p-8 bg-violet-50 rounded-canva border-2 border-dashed border-violet-200 max-w-2xl mx-auto">
                        <p class="text-lg text-slate-700 mb-4 font-semibold">💡 Profi-Tipp:</p>
                        <p class="text-slate-600">Du kannst diese Befehle direkt in der <span class="font-bold">Scratch Jr. App</span> ausprobieren!</p>
                    </div>
                </main>`;
            }
            else if (state.view === 'missions') {
                const mission = MISSIONS[state.currentIndex];
                const progress = ((state.currentIndex + 1) / MISSIONS.length) * 100;

                html = header + `
                <main class="max-w-3xl mx-auto px-6 py-12 animate-fadeIn">
                    <div class="w-full h-2 bg-slate-200 rounded-full mb-8 overflow-hidden">
                        <div class="h-full bg-violet-600 transition-all duration-500" style="width: ${progress}%"></div>
                    </div>

                    <div class="bg-white p-8 md:p-12 rounded-canva border border-slate-200 shadow-xl space-y-8">
                        <div class="flex justify-center mb-4">
                            <span class="bg-violet-100 text-violet-700 px-4 py-1 rounded-full font-bold text-sm tracking-wider">
                                MISSION ${state.currentIndex + 1} VON ${MISSIONS.length}
                            </span>
                        </div>

                        <div class="text-center space-y-4">
                            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">${mission.title}</h1>
                            <p class="text-xl text-slate-600 leading-relaxed">${mission.task}</p>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-2xl flex items-center justify-center gap-2 border border-slate-100 shadow-inner">
                            ${mission.blocks.map(b => `<img src="../../assets/blocks/${b}.png" class="w-16 h-16 md:w-20 md:h-20 object-contain hover:scale-110 transition-transform" />`).join('')}
                        </div>

                        <div class="bg-violet-50 p-6 rounded-2xl border-l-4 border-violet-500">
                             <p class="text-slate-700"><span class="font-bold">💡 Tipp:</span> ${mission.tip}</p>
                        </div>

                        <button onclick="handleNext()" class="w-full btn-violet py-6 rounded-2xl text-2xl font-bold shadow-lg">
                            Erledigt! Weiter 🚀
                        </button>
                    </div>
                </main>`;
            }
            else if (state.view === 'finished') {
                html = header + `
                <main class="max-w-xl mx-auto px-6 py-20 animate-fadeIn text-center">
                    <div class="text-7xl mb-6">🎉</div>
                    <h2 class="text-4xl font-bold text-slate-900 mb-4">Geschafft!</h2>
                    <p class="text-xl text-slate-600 mb-8">Du hast alle Robotik-Missionen gemeistert. Wie heißt du, kleiner Programmierer?</p>
                    
                    <input type="text" id="name-input" oninput="state.userName = this.value" class="w-full p-5 rounded-2xl border-2 border-slate-200 text-2xl text-center outline-none focus:border-violet-600 mb-6" placeholder="Dein Vorname">
                    
                    <button onclick="state.view='certificate'; render(); playSound('success');" class="w-full btn-violet py-6 rounded-2xl text-2xl font-bold">
                        Urkunde erhalten 📜
                    </button>
                </main>`;
            }
            else if (state.view === 'certificate') {
                html = `
                <div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 animate-fadeIn">
                    <div class="bg-white border-[12px] border-slate-900 rounded-canva p-12 max-w-3xl w-full text-center space-y-8 shadow-2xl relative">
                        <div class="absolute top-4 right-4 text-4xl opacity-20">🤖</div>
                        <h1 class="text-5xl font-bold tracking-widest text-slate-900">URKUNDE</h1>
                        <p class="text-2xl text-slate-500">Herzlichen Glückwunsch</p>
                        <h2 class="text-6xl font-bold border-b-4 border-dashed border-slate-900 inline-block px-8 pb-2 my-8">
                             ${state.userName || "Held"}
                        </h2>
                        <p class="text-2xl text-violet-600 font-bold">Zum Robotik-Experten</p>
                        <p class="text-xl text-slate-600 italic">"Ich beherrsche die Grundlagen der Programmierung <br/> und kann digitale Helden steuern!"</p>
                        <div class="text-6xl pt-6">🤖 ⭐ 🧩</div>
                    </div>
                    <div class="mt-12 flex flex-col gap-4 no-print items-center">
                        <button onclick="window.print()" class="px-10 py-5 btn-violet rounded-canva text-xl font-bold shadow-lg">Urkunde drucken 🖨️</button>
                        <button onclick="window.location.href='../../index.html'" class="text-slate-500 font-bold hover:text-slate-900 transition">Zurück zum Klassenzimmer 🏠</button>
                    </div>
                </div>`;
            }

            app.innerHTML = html;
        }

        function handleNext() {
            playSound('click');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#7c3aed', '#3b82f6', '#10b981'] });

            if (state.currentIndex < MISSIONS.length - 1) {
                state.currentIndex++;
                render();
            } else {
                state.view = 'finished';
                render();
            }
        }

        // Start App
        render();
    </script>
</body>

</html>
